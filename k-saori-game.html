<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予測不能なスパークルアート</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            touch-action: none;
            background-color: #111111;
            color: white;
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .cyber-red {
            text-shadow: 0 0 10px rgba(230, 0, 18, 0.8);
            color: #E60012;
        }

        .purple-glow {
            text-shadow: 0 0 15px rgba(155, 89, 182, 0.8);
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.4);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            cursor: crosshair;
        }

        .canvas-wrapper {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background-color: #0a0a0a;
            border: 1px solid rgba(155, 89, 182, 0.3);
            box-shadow: 0 0 40px rgba(155, 89, 182, 0.15);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        #gaugeContainer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 200px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            backdrop-filter: blur(5px);
            z-index: 10;
        }

        .instruction {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: bold;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
            pointer-events: none;
            z-index: 10;
        }

        @keyframes pulse {
            0% {
                opacity: 0.6;
            }

            50% {
                opacity: 1;
                text-shadow: 0 0 15px rgba(230, 0, 18, 0.8);
            }

            100% {
                opacity: 0.6;
            }
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4 select-none">

    <div class="text-center mb-4 mt-2">
        <h1 class="text-2xl md:text-3xl font-bold text-white tracking-widest leading-relaxed">
            <span class="text-[#d8b4fe] font-['Orbitron']">CAO</span>からの挑戦：<br class="md:hidden">予測不能なスパークルアートを爆発させろ！
        </h1>
    </div>

    <div class="canvas-wrapper w-full relative">
        <canvas id="gameCanvas"></canvas>

        <div id="gaugeContainer">
            <div class="text-xs text-gray-300 mb-1 font-bold">注入した感性レベル</div>
            <div class="w-full bg-gray-800 rounded-full h-3 mb-1 overflow-hidden border border-gray-600">
                <div id="gaugeBar"
                    class="bg-gradient-to-r from-purple-500 to-pink-500 h-full rounded-full transition-all duration-300 ease-out"
                    style="width: 0%"></div>
            </div>
            <div class="text-right text-[#d8b4fe] font-['Orbitron'] font-bold text-sm"><span id="gaugeText">0</span> %
            </div>
        </div>

        <div id="instruction" class="instruction cyber-red tracking-widest">
            <i class="fas fa-hand-pointer mr-2"></i>クリック（タップ）で描画
        </div>

        <!-- Modal -->
        <div id="modal"
            class="absolute inset-0 bg-black/85 backdrop-blur-sm z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 p-6 text-center">
            <h3
                class="text-3xl md:text-5xl font-bold mb-4 text-[#d8b4fe] drop-shadow-[0_0_15px_rgba(216,180,254,0.8)] leading-tight">
                感性100%達成！
            </h3>
            <p class="text-gray-200 mb-8 leading-relaxed max-w-lg md:text-lg font-bold">
                予測不能なアートの感性は、<br>御社のビジネスに新たな価値をもたらします。
            </p>

            <a href="https://axelon.co.jp"
                class="bg-gradient-to-r from-[#9b59b6] to-[#8e44ad] text-white font-bold py-4 px-8 md:px-12 rounded-full purple-glow hover:scale-105 transition-transform">
                <i class="fas fa-paint-brush mr-2"></i> CAO独自の感性をビジネスに注入（フォームへ）
            </a>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gaugeBar = document.getElementById('gaugeBar');
        const gaugeText = document.getElementById('gaugeText');
        const modal = document.getElementById('modal');
        const instruction = document.getElementById('instruction');

        let GAME_WIDTH = canvas.parentElement.clientWidth;
        let GAME_HEIGHT = canvas.parentElement.clientHeight;

        function resizeCanvas() {
            GAME_WIDTH = canvas.parentElement.clientWidth;
            GAME_HEIGHT = canvas.parentElement.clientHeight;
            // Handle high DPI displays for crisp rendering
            const dpr = window.devicePixelRatio || 1;
            canvas.width = GAME_WIDTH * dpr;
            canvas.height = GAME_HEIGHT * dpr;
            ctx.scale(dpr, dpr);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        let particles = [];
        let level = 0;
        let isComplete = false;
        const colors = ['#9b59b6', '#3498db', '#2ecc71', '#ffffff', '#e056fd', '#00d8d6'];
        const shapes = ['circle', 'square', 'star', 'sparkle'];

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = Math.random() * 8 + 2;

                // Explosive outward velocity
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 12 + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;

                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.shape = shapes[Math.floor(Math.random() * shapes.length)];

                this.life = 1.0;
                this.decay = Math.random() * 0.015 + 0.005;

                // Rotational properties
                this.angle = Math.random() * Math.PI;
                this.vAngle = (Math.random() - 0.5) * 0.2;

                // Physics
                this.gravity = 0.15;
                this.drag = 0.96;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.fillStyle = this.color;
                ctx.strokeStyle = this.color;

                if (this.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI * 2);
                    ctx.fill();
                } else if (this.shape === 'square') {
                    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                } else if (this.shape === 'star') {
                    ctx.beginPath();
                    for (let i = 0; i < 5; i++) {
                        ctx.lineTo(Math.cos((18 + i * 72) / 180 * Math.PI) * this.size, -Math.sin((18 + i * 72) / 180 * Math.PI) * this.size);
                        ctx.lineTo(Math.cos((54 + i * 72) / 180 * Math.PI) * this.size * 0.4, -Math.sin((54 + i * 72) / 180 * Math.PI) * this.size * 0.4);
                    }
                    ctx.closePath();
                    ctx.fill();
                } else if (this.shape === 'sparkle') {
                    ctx.beginPath();
                    ctx.moveTo(0, -this.size);
                    ctx.quadraticCurveTo(this.size * 0.2, -this.size * 0.2, this.size, 0);
                    ctx.quadraticCurveTo(this.size * 0.2, this.size * 0.2, 0, this.size);
                    ctx.quadraticCurveTo(-this.size * 0.2, this.size * 0.2, -this.size, 0);
                    ctx.quadraticCurveTo(-this.size * 0.2, -this.size * 0.2, 0, -this.size);
                    ctx.fill();
                }

                ctx.restore();
            }

            update() {
                this.vx *= this.drag;
                this.vy *= this.drag;
                this.vy += this.gravity;

                this.x += this.vx;
                this.y += this.vy;

                this.angle += this.vAngle;
                this.life -= this.decay;
            }
        }

        // Background trails for art effect
        function drawBackground() {
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(10, 10, 10, 0.2)'; // Leave trails
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.globalCompositeOperation = 'lighter'; // Additive blending for glows
        }

        function createExplosion(x, y) {
            // Unpredictable large burst
            const count = Math.floor(Math.random() * 50) + 40;
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y));
            }

            // Random flashing background
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
            ctx.globalAlpha = 0.1;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            ctx.globalAlpha = 1.0;
        }

        function triggerLevelUp() {
            if (isComplete) return;

            instruction.style.opacity = '0'; // hide instruction after first click

            // Randomly increase level by 12-25%
            const bump = Math.floor(Math.random() * 14) + 12;
            level += bump;
            if (level >= 100) {
                level = 100;
                isComplete = true;
            }

            // Update UI
            gaugeBar.style.width = level + '%';

            // Number animation
            let start = parseInt(gaugeText.innerText);
            let end = level;
            let dur = 300;
            let startT = performance.now();

            function animateNumber(time) {
                let progress = Math.min((time - startT) / dur, 1);
                gaugeText.innerText = Math.floor(start + (end - start) * progress);
                if (progress < 1) requestAnimationFrame(animateNumber);
            }
            requestAnimationFrame(animateNumber);

            if (isComplete) {
                setTimeout(() => {
                    modal.classList.remove('opacity-0', 'pointer-events-none');
                }, 1000);
            }
        }

        function handleInteract(e) {
            if (e.target.closest('#modal') || isComplete) return;

            const rect = canvas.getBoundingClientRect();
            let x, y;

            if (e.type.includes('touch')) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }

            createExplosion(x, y);
            triggerLevelUp();
        }

        canvas.addEventListener('mousedown', handleInteract);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleInteract(e);
        }, { passive: false });

        function animate() {
            drawBackground();

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }

            requestAnimationFrame(animate);
        }

        // Start
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        animate();

    </script>
</body>

</html>

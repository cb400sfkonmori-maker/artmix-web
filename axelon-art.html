<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spiral Art — AxelOn Inc.</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.3/lib/p5.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #121212; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: fixed;
            top: 18px;
            left: 18px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.28);
            line-height: 2.1;
            pointer-events: none;
            letter-spacing: 0.05em;
        }
        #mode-label {
            display: inline-block;
            padding: 3px 12px;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 20px;
            font-size: 10px;
            color: rgba(255,255,255,0.22);
            letter-spacing: 0.08em;
        }
        #credit {
            position: fixed;
            bottom: 18px;
            right: 18px;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px;
            color: rgba(255,255,255,0.16);
            pointer-events: none;
            letter-spacing: 0.12em;
        }
    </style>
</head>
<body>
<div id="info">
    MOVE MOUSE to rotate &nbsp;·&nbsp; SCROLL to zoom<br>
    CLICK to change MODE &nbsp;·&nbsp; SPACE to pause<br>
    <span id="mode-label">MODE 1 : Green &amp; Blue</span>
</div>
<div id="credit">© AxelOn Inc.</div>

<script>
// ---- パラメータ ----
const N       = 500;   // パーティクル数（point()コール数/frame）
const HALF_H  = 265;
const R_MIN_B = 32;
const R_MAX   = 160;

// ---- 状態 ----
let ang, tang;
let counter  = 0;
let counting = true;
let mode     = 0;
let zoom     = 1.0;
let pts      = [];

const MODES = [
    { label: 'MODE 1 : Green & Blue', lerpSpd: 0.07, rotSpd:  0.014, colorFn: cGreenBlue },
    { label: 'MODE 2 : Fire & Ember', lerpSpd: 0.04, rotSpd:  0.022, colorFn: cFireEmber },
    { label: 'MODE 3 : Mono Chrome',  lerpSpd: 0.12, rotSpd: -0.009, colorFn: cMono      },
];

// ---- setup ----
function setup() {
    createCanvas(windowWidth, windowHeight);
    ang  = createVector(0.05, 0, 0);
    tang = createVector(0.05, 0, 0);
    for (let i = 0; i < N; i++) pts.push(newPt(random())); // t をバラけさせる
}

function newPt(startT) {
    return {
        t:     startT ?? random(),     // 高さ位置 0〜1
        theta: random(TWO_PI),         // 回転角
        spd:   random(0.003, 0.010),   // 上昇速度
    };
}

// ---- draw ----
function draw() {
    // 低アルファのback → フレームをまたぐトレイル（残像）効果
    background(18, 18, 18, 18);
    translate(width / 2, height / 2);

    let cm = MODES[mode];
    if (counting) counter++;

    // マウス追従（参考コード準拠: ang.lerp）
    tang.y = map(mouseX, 0, width,  -PI,           PI,           true);
    tang.x = map(mouseY, 0, height, -HALF_PI*0.75, HALF_PI*0.75, true);
    ang.lerp(tang, cm.lerpSpd);

    // 脈動パラメータ
    let pulse = cos(counter / 220);

    for (let p of pts) {
        // 位置を更新
        p.theta += cm.rotSpd;
        p.t     += p.spd;
        if (p.t > 1.02) Object.assign(p, newPt(0)); // 上端を超えたら底へ

        // ハイパーボロイド面上の3D座標
        let yn   = p.t * 2 - 1;
        let rMin = R_MIN_B * (1 + 0.45 * pulse);
        let r    = sqrt(rMin*rMin + (R_MAX*R_MAX - rMin*rMin) * yn*yn);
        if (yn < 0) r *= 1 + 0.18 * (-yn);

        let pos = project3D(r * cos(p.theta), yn * HALF_H, r * sin(p.theta));

        // 奥行きで明るさ・サイズを変える（立体感）
        let sz    = map(pos.z, -300, 300, 1.0, 3.5, true);
        let alpha = map(pos.z, -300, 300, 130, 245, true);

        stroke(cm.colorFn(p.t, alpha));
        strokeWeight(sz);
        point(pos.x, pos.y);
    }
}

// ---- 3D投影（ang に追従） ----
function project3D(x, y, z) {
    let cy = cos(ang.y), sy = sin(ang.y);
    let x1 = x * cy + z * sy;
    let z1 = -x * sy + z * cy;

    let cx = cos(ang.x), sx = sin(ang.x);
    let y2 = y * cx - z1 * sx;
    let z2 = y * sx + z1 * cx;

    let sc = 760 / (760 + z2) * zoom;
    return { x: x1 * sc, y: y2 * sc, z: z2 };
}

// ---- カラースキーム ----
function cGreenBlue(t, a) {
    if (t < 0.5) {
        let b = t / 0.5;
        return color(lerp(5,12,b), lerp(28,108,b), lerp(195,162,b), a);
    }
    let b = (t - 0.5) / 0.5;
    return color(lerp(12,5,b), lerp(108,148,b), lerp(162,110,b), a);
}

function cFireEmber(t, a) {
    if (t < 0.5) {
        let b = t / 0.5;
        return color(lerp(160,220,b), lerp(10,60,b), lerp(5,10,b), a);
    }
    let b = (t - 0.5) / 0.5;
    return color(lerp(220,245,b), lerp(60,165,b), lerp(10,20,b), a);
}

function cMono(t, a) {
    return color(lerp(100, 235, t), lerp(100, 235, t), lerp(100, 235, t), a);
}

// ---- インタラクション ----
function mouseClicked() {
    mode = (mode + 1) % MODES.length;
    let cm = MODES[mode];
    document.getElementById('mode-label').textContent = cm.label;
    if (counting) {
        tang = createVector(0.05, 0, 0);
        counter = 0;
        frameCount = 0;
    }
}

function mouseWheel(event) {
    zoom *= (1 - event.delta * 0.0012);
    zoom  = constrain(zoom, 0.2, 5.0);
    return false;
}

// ---- スマホ：ピンチでズーム ----
let prevPinchDist = -1;

function touchStarted() {
    if (touches.length === 2) {
        prevPinchDist = dist(touches[0].x, touches[0].y, touches[1].x, touches[1].y);
        return false; // 2本指のみデフォルト無効化（ブラウザズームを防ぐ）
    }
    // 1本指はreturnしない → タップがmouseClickedに変換される
}

function touchMoved() {
    if (touches.length === 2) {
        let d = dist(touches[0].x, touches[0].y, touches[1].x, touches[1].y);
        if (prevPinchDist > 0) {
            zoom *= d / prevPinchDist;
            zoom  = constrain(zoom, 0.2, 5.0);
        }
        prevPinchDist = d;
    }
    return false; // ドラッグ中のページスクロールを防ぐ
}

function touchEnded() {
    prevPinchDist = -1;
    // return false しない → mouseClicked が発火してモード切替できる
}

function keyPressed() {
    if (keyCode === 32) counting = !counting;
}

function windowResized() {
    resizeCanvas(windowWidth, windowHeight);
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F1エンジニアの執念：0.01ミリのショット</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            touch-action: none;
            background-color: #111111;
            color: white;
        }

        .cyber-red {
            text-shadow: 0 0 10px rgba(230, 0, 18, 0.8);
        }

        .gold-glow {
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.8);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .canvas-wrapper {
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background-color: #1a1a1a;
            border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
    </style>
</head>

<body class="flex flex-col items-center justify-center min-h-screen p-4 select-none">

    <div class="text-center mb-6">
        <h1 class="text-3xl font-bold font-['Orbitron'] text-[#d4af37] mb-2 tracking-widest gold-glow bg-clip-text">
            AxelOn</h1>
        <h2 class="text-lg md:text-xl font-bold text-white tracking-widest">
            <span class="text-[#d4af37]">T.Komori</span> 最高技術顧問からの挑戦状
            <span class="text-sm text-gray-400 mt-2 block">F1エンジニアの執念：0.01ミリのショット</span>
        </h2>
    </div>

    <div class="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>

    </div>

    <!-- Modal (Moved out of canvas-wrapper for full screen overlay) -->
    <div id="modal"
        class="fixed inset-0 bg-black/90 backdrop-blur-sm z-50 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 p-4 sm:p-6 text-center w-full h-full overflow-y-auto">
        <h3 id="modalTitle" class="text-3xl md:text-4xl font-bold mb-3 font-['Orbitron']">RESULT</h3>
        <p id="modalDesc" class="text-sm md:text-base text-gray-300 mb-6 leading-relaxed max-w-md"></p>

        <a href="https://axelon.co.jp"
            class="bg-gradient-to-r from-[#d4af37] to-[#b5952f] text-black font-bold py-3 px-6 md:py-4 md:px-10 rounded-full gold-glow hover:scale-105 transition-transform mb-4 w-full max-w-[320px]">
            <i class="fas fa-chess-knight mr-2"></i> AI顧問へ相談する
        </a>
        <button id="retryBtn"
            class="text-[#4a90e2] border-2 border-[#4a90e2] px-6 py-2 rounded-full hover:bg-[#4a90e2]/10 transition-colors font-bold w-full max-w-[280px]">
            もう一度挑戦する
        </button>
    </div>

    <p class="mt-6 text-gray-500 text-sm"><i class="fas fa-mouse-pointer mr-1"></i> 画面タップ / クリックでパワー決定</p>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const modal = document.getElementById('modal');
        const modalTitle = document.getElementById('modalTitle');
        const modalDesc = document.getElementById('modalDesc');
        const retryBtn = document.getElementById('retryBtn');

        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 450;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        const groundY = 380;
        const cup = { x: 735, w: 35 };

        let ball = { x: 50, y: groundY - 6, radius: 6, vx: 0, vy: 0 };
        let power = 0;
        let powerDir = 1;
        let state = 'START'; // START, POWER, ROLL, WAIT, END
        let animationId;

        const config = {
            gravity: 0.5,
            bounce: 0.5,
            friction: 0.96,
            maxPowerVx: 17,
            maxPowerVy: -15,
            baseVy: -3
        };

        const obstacles = [
            { x: 250, y: groundY, w: 36, h: 36, emoji: '💮' },
            { x: 450, y: groundY, w: 36, h: 36, emoji: '📄' },
            { x: 620, y: groundY, w: 36, h: 36, emoji: '🏦' }
        ];

        function drawScene() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Night Sky / Background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Draw Target Range Hint
            ctx.fillStyle = 'rgba(212, 175, 55, 0.05)';
            ctx.fillRect(cup.x - 30, 0, cup.w + 60, GAME_HEIGHT);

            // Ground
            ctx.strokeStyle = '#27ae60'; // Green grass color
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, groundY);
            ctx.lineTo(cup.x, groundY); // Before cup
            ctx.moveTo(cup.x + cup.w, groundY); // After cup
            ctx.lineTo(GAME_WIDTH, groundY);
            ctx.stroke();

            // Cup Hole
            ctx.fillStyle = '#111';
            ctx.fillRect(cup.x, groundY, cup.w, GAME_HEIGHT - groundY);

            // Flag
            ctx.font = '36px sans-serif';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🚩', cup.x + cup.w + 2, groundY);

            // Obstacles
            ctx.font = '36px sans-serif';
            for (const ob of obstacles) {
                ctx.fillText(ob.emoji, ob.x, ob.y);
            }

            // Ball
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = 'rgba(255, 255, 255, 0.8)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0; // reset

            // Texts
            if (state === 'START') {
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 24px Noto Sans JP';
                ctx.textAlign = 'center';
                ctx.fillText('画面をタップしてパワーメーターを始動', GAME_WIDTH / 2, 150);
            } else if (state === 'POWER') {
                ctx.fillStyle = '#d4af37';
                ctx.font = 'bold 24px Noto Sans JP';
                ctx.textAlign = 'center';
                ctx.fillText('もう一度タップしてショット！', GAME_WIDTH / 2, 150);
            }

            // Power Meter
            const meterX = GAME_WIDTH / 2 - 200;
            const meterY = 410;
            const meterW = 400;
            const meterH = 20;

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#444';
            ctx.strokeRect(meterX, meterY, meterW, meterH);

            // Sweet spot indicator (approx 74% ~ 88%)
            ctx.fillStyle = 'rgba(212, 175, 55, 0.3)';
            ctx.fillRect(meterX + meterW * 0.74, meterY, meterW * 0.14, meterH);

            ctx.fillStyle = '#E60012';
            ctx.fillRect(meterX, meterY, meterW * (power / 100), meterH);
        }

        function endGame(isWin, msg) {
            state = 'END';
            if (isWin) {
                modalTitle.innerText = 'ナイスショット！';
                modalTitle.className = "text-3xl md:text-4xl font-bold mb-3 font-['Orbitron'] text-[#d4af37] drop-shadow-[0_0_15px_rgba(212,175,55,0.8)]";
                modalDesc.innerText = '0.01ミリの精度で到達しました。\n次なる事業変革は、AxelOnにご相談ください。';
            } else {
                modalTitle.innerText = 'CRASH...';
                modalTitle.className = "text-3xl md:text-4xl font-bold mb-3 font-['Orbitron'] text-[#E60012] drop-shadow-[0_0_15px_rgba(230,0,18,0.8)]";
                modalDesc.innerText = msg + '\n\n古い商習慣に捕まりましたか？ 御社のDXと利益改善は、AxelOnにご相談ください。';
            }
            modal.classList.remove('opacity-0', 'pointer-events-none');
        }

        function update() {
            if (state === 'POWER') {
                power += powerDir * 2.0;
                if (power >= 100) { power = 100; powerDir = -1; }
                if (power <= 0) { power = 0; powerDir = 1; }
            }

            if (state === 'ROLL') {
                ball.vy += config.gravity;
                ball.x += ball.vx;
                ball.y += ball.vy;

                // Subtle magnetic pull (slope) if the ball lands just before or after the cup
                if (ball.y >= groundY - ball.radius - 5) {
                    if (ball.x > cup.x - 40 && ball.x <= cup.x) {
                        ball.vx += 0.15; // Roll towards cup from left
                    } else if (ball.x >= cup.x + cup.w && ball.x < cup.x + cup.w + 20) {
                        ball.vx -= 0.15; // Roll back towards cup from right
                    }
                }

                // Check Cup and Ground
                const inCupX = ball.x > cup.x + 2 && ball.x < cup.x + cup.w - 2;

                if (inCupX) {
                    if (ball.y >= groundY - ball.radius) {
                        ball.vx *= 0.2; // Strong friction inside hole to drop straight down
                    }
                    if (ball.y > groundY + 10) {
                        ball.vx = 0; ball.vy = 0;
                        if (state !== 'WAIT') {
                            state = 'WAIT';
                            setTimeout(() => endGame(true), 200);
                        }
                    }
                } else {
                    // Check Ground
                    if (ball.y > groundY - ball.radius) {
                        ball.y = groundY - ball.radius;
                        ball.vy = -ball.vy * config.bounce;
                        ball.vx *= config.friction;
                        if (Math.abs(ball.vy) < 1.0) ball.vy = 0;
                    }
                }

                // Check Obstacles
                for (const ob of obstacles) {
                    if (ball.x + ball.radius > ob.x + 5 && ball.x - ball.radius < ob.x + ob.w - 5 &&
                        ball.y + ball.radius > ob.y - ob.h + 5 && ball.y - ball.radius < ob.y) {
                        ball.vx = 0; ball.vy = 0;
                        state = 'WAIT';
                        setTimeout(() => endGame(false, `障害物（${ob.emoji}）に衝突しました。`), 200);
                    }
                }

                // Stop conditions
                if (state === 'ROLL') {
                    if (ball.x > GAME_WIDTH + 10 || ball.x < -10) {
                        state = 'WAIT';
                        setTimeout(() => endGame(false, 'グリーンをオーバーしました。'), 200);
                    } else if (!inCupX && Math.abs(ball.vx) < 0.05 && Math.abs(ball.vy) < 0.1 && ball.y >= groundY - ball.radius - 1) {
                        state = 'WAIT';
                        setTimeout(() => endGame(false, 'カップに届きませんでした。'), 200);
                    }
                }
            }
        }

        function gameLoop() {
            update();
            drawScene();
            animationId = requestAnimationFrame(gameLoop);
        }

        function handleClick(e) {
            // モーダル上のクリックは無視
            if (e.target.closest('#modal')) return;

            if (state === 'START') {
                state = 'POWER';
                power = 0;
                powerDir = 1;
            } else if (state === 'POWER') {
                state = 'ROLL';
                ball.vx = (power / 100) * config.maxPowerVx;
                ball.vy = config.baseVy + (power / 100) * config.maxPowerVy;
            }
        }

        retryBtn.addEventListener('click', () => {
            modal.classList.add('opacity-0', 'pointer-events-none');
            state = 'START';
            power = 0;
            ball.x = 50;
            ball.y = groundY - ball.radius;
            ball.vx = 0;
            ball.vy = 0;
        });

        // Add touch/mouse listeners to canvas wrapper to avoid triggering on whole body
        const wrapper = document.querySelector('.canvas-wrapper');
        wrapper.addEventListener('mousedown', handleClick);
        wrapper.addEventListener('touchstart', (e) => {
            e.preventDefault(); // prevent zoom/scroll
            handleClick(e);
        });

        // Initial paint
        gameLoop();
    </script>
</body>

</html>
